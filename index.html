<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Coins Investing Game</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="phone" aria-labelledby="game-title">
      <section class="scoreboard" aria-live="polite">
        <div class="title-block">
          <p class="eyebrow">Investing game</p>
          <h1 id="game-title">Coins</h1>
        </div>
        <div class="status-pill" id="game-state">Playing</div>
        <details class="app-menu">
          <summary aria-label="Open game menu">...</summary>
          <div class="menu-panel">
            <button id="new-game-button" type="button">New game</button>
            <button id="settings-button" type="button">Settings</button>
          </div>
        </details>
      </section>

      <section class="zone zone--presents" aria-label="Wrapped presents">
        <div class="present-grid" id="present-grid"></div>
      </section>

      <section class="playfield" aria-label="Game board">
        <section class="zone zone--purse" data-drop="purse" aria-label="Purse">
          <div class="coin-tray coin-tray--particles" id="purse-coins"></div>
        </section>

        <section class="zone zone--bank" data-drop="bank" aria-label="Savings bank">
          <div class="bank-summary">
            <div class="bank-summary__row">
              <span>Total dollars in savings</span>
              <strong id="bank-total">$0</strong>
            </div>
            <div class="interest-progress" aria-label="Interest progress">
              <span id="bank-interest-progress"></span>
            </div>
          </div>
          <div class="coin-tray coin-tray--bank coin-tray--particles" id="bank-coins"></div>
        </section>

        <section class="zone zone--robot" data-drop="robot" aria-label="Robot">
          <div class="robot">
            <div class="robot-head" aria-hidden="true"><span class="robot-head__emoji">🤖</span></div>
            <div class="robot-body">
              <div class="robot-stack" id="robot-stack"></div>
            </div>
          </div>
        </section>
      </section>

      <section class="message-panel" id="message-panel" aria-live="assertive">
        Feed the robot first, then invest coins so they can make more coins.
      </section>
    </main>

    <section class="result-overlay" id="result-overlay" aria-live="assertive" hidden>
      <div class="result-card">
        <p class="result-kicker" id="result-kicker"></p>
        <h2 class="result-title" id="result-title"></h2>
        <p class="result-message" id="result-message"></p>
        <p class="result-detail" id="result-detail"></p>
        <button class="result-button" id="result-new-game-button" type="button">Play again</button>
      </div>
    </section>

    <dialog class="settings-dialog" id="settings-dialog">
      <form method="dialog" class="settings-form" id="settings-form">
        <div class="settings-heading">
          <div>
            <p class="eyebrow">Difficulty</p>
            <h2>Game settings</h2>
          </div>
          <button class="icon-button" type="button" aria-label="Close settings">x</button>
        </div>

        <div class="preset-row" aria-label="Preset difficulties">
          <button type="button" class="preset-button" data-preset="easy">Easy</button>
          <button type="button" class="preset-button" data-preset="medium">Medium</button>
          <button type="button" class="preset-button" data-preset="hard">Hard</button>
        </div>

        <div class="settings-grid">
          <label>
            Payrate P (seconds; static = 1)
            <input id="payrate-input" name="payrate" type="number" min="1" max="120" step="1" required />
          </label>
          <label>
            Depreciation D (x P)
            <input id="depreciation-input" name="depreciation" type="number" min="0.1" max="20" step="0.01" required />
          </label>
          <label>
            Feedrate F (coins)
            <input id="feedrate-input" name="feedrate" type="number" min="1" max="12" step="1" required />
          </label>
          <label>
            Start S (coins)
            <input id="start-input" name="start" type="number" min="1" max="12" step="1" required />
          </label>
          <label>
            Interest I (x P)
            <input id="interest-input" name="interest" type="number" min="0.1" max="100" step="0.01" required />
          </label>
          <label>
            Presents G
            <input id="presents-input" name="presents" type="number" min="1" max="24" step="1" required />
          </label>
          <label>
            Lifetime L (wage coins)
            <input id="lifetime-input" name="lifetime" type="number" min="1" max="50" step="1" required />
          </label>
          <label class="settings-check">
            <input id="static-input" name="staticMode" type="checkbox" />
            Static mode: advance one P-second after each move
          </label>
        </div>

        <menu class="dialog-actions">
          <button type="button" class="secondary-button" id="reset-defaults-button">Defaults</button>
          <button class="control-button" id="save-settings-button" value="save">Save and restart</button>
        </menu>
      </form>
    </dialog>

    <script src="app.js" defer></script>
  </body>
</html>
